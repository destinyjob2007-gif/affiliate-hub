<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment - coach destiny</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; }
        .hidden { display: none; }
        .pending { animation: blink 2s infinite; }
        @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- PAYMENT FORM -->
    <div id="step1" class="w-full max-w-md bg-white/5 border border-white/10 rounded-2xl p-6">
        <h2 class="text-2xl font-bold text-center mb-2">Make Payment</h2>
        <p class="text-gray-400 text-center mb-6">Pay ₦10,000 to join</p>
        
        <input type="text" id="name" placeholder="Full Name" class="w-full p-3 mb-3 rounded-lg bg-white/10 border border-white/20 text-white">
        <input type="email" id="email" placeholder="Email" class="w-full p-3 mb-3 rounded-lg bg-white/10 border border-white/20 text-white">
        <input type="tel" id="phone" placeholder="Phone Number" class="w-full p-3 mb-3 rounded-lg bg-white/10 border border-white/20 text-white">
        <input type="text" id="transId" placeholder="Transaction ID" class="w-full p-3 mb-6 rounded-lg bg-white/10 border border-white/20 text-white">
        
        <button onclick="submitPayment()" class="w-full bg-blue-600 hover:bg-blue-700 py-3 rounded-lg font-bold">
            Submit Payment
        </button>
        
        <p class="text-center mt-4 text-sm text-gray-400">
            Pay to: OPAY<br>
            Acc: 9135204957<br>
            Name: Coach Destiny mendus job
        </p>
    </div>

    <!-- PENDING SCREEN -->
    <div id="step2" class="w-full max-w-md bg-white/5 border border-white/10 rounded-2xl p-6 text-center hidden">
        <div class="w-20 h-20 bg-yellow-500/20 rounded-full flex items-center justify-center mx-auto mb-4 pending">
            <i class="fas fa-clock text-3xl text-yellow-400"></i>
        </div>
        <h2 class="text-2xl font-bold mb-2">Payment Pending</h2>
        <p class="text-gray-400 mb-4">Waiting for confirmation...</p>
        
        <div class="bg-white/5 rounded-lg p-4 mb-4">
            <p class="text-sm text-gray-400">Your Transaction ID</p>
            <p id="showTransId" class="text-xl font-bold text-yellow-400"></p>
        </div>
        
        <p class="text-sm text-gray-500">Checking status...</p>
        <button onclick="checkStatus()" class="mt-4 text-blue-400 underline">
            Check Now
        </button>
    </div>

    <!-- CONFIRMED SCREEN -->
    <div id="step3" class="w-full max-w-md bg-white/5 border border-white/10 rounded-2xl p-6 text-center hidden">
        <div class="w-20 h-20 bg-green-500/20 rounded-full flex items-center justify-center mx-auto mb-4">
            <i class="fas fa-check-circle text-3xl text-green-400"></i>
        </div>
        <h2 class="text-2xl font-bold text-green-400 mb-2">Payment Confirmed!</h2>
        <p class="text-gray-400 mb-4">Welcome to Coach Destiny</p>
        
        <div class="bg-white/5 rounded-lg p-4 mb-4">
            <p class="text-sm text-gray-400">Your Affiliate Link</p>
            <p class="text-lg font-bold text-blue-400">coachdestiny.com/ref/<span id="refCode"></span></p>
        </div>
        
        <a href="index.html" class="block w-full bg-green-600 hover:bg-green-700 py-3 rounded-lg font-bold text-center">
            Go to Dashboard
        </a>
    </div>

    <script>
        // Check if already has pending payment
        window.onload = function() {
            const saved = localStorage.getItem('myPayment');
            if (saved) {
                const data = JSON.parse(saved);
                if (data.status === 'pending') {
                    showPending(data.transId);
                } else if (data.status === 'confirmed') {
                    showConfirmed(data);
                }
            }
        };

        function submitPayment() {
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const transId = document.getElementById('transId').value;
            
            if (!name || !email || !phone || !transId) {
                alert('Fill all fields');
                return;
            }
            
            const paymentData = {
                name, email, phone, transId,
                status: 'pending',
                time: new Date().toLocaleString()
            };
            
            // Save to localStorage
            localStorage.setItem('myPayment', JSON.stringify(paymentData));
            
            // Also add to admin list
            let allPayments = JSON.parse(localStorage.getItem('allPayments') || '[]');
            allPayments.push(paymentData);
            localStorage.setItem('allPayments', JSON.stringify(allPayments));
            
            showPending(transId);
        }

        function showPending(transId) {
            document.getElementById('step1').classList.add('hidden');
            document.getElementById('step2').classList.remove('hidden');
            document.getElementById('showTransId').textContent = transId;
        }

        function checkStatus() {
            const saved = localStorage.getItem('myPayment');
            if (saved) {
                const data = JSON.parse(saved);
                if (data.status === 'confirmed') {
                    showConfirmed(data);
                } else {
                    alert('Still pending. Please wait for admin confirmation.');
                }
            }
        }

        function showConfirmed(data) {
            document.getElementById('step2').classList.add('hidden');
            document.getElementById('step3').classList.remove('hidden');
            document.getElementById('refCode').textContent = data.transId.slice(-6);
        }
    </script>
</body>
</html>
