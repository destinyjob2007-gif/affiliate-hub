<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Coach Destiny Affiliate Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: #ffffff; font-family: 'Outfit', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .status-pending { background: #f59e0b; color: #000; }
        .status-approved { background: #10b981; color: #fff; }
        .status-rejected { background: #ef4444; color: #fff; }
        .payment-unpaid { background: #6b7280; }
        .payment-paid { background: #3b82f6; }
        .payment-verified { background: #10b981; }
        .shake { animation: shake 0.5s; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
    </style>
</head>
<body class="min-h-screen">

    <!-- LOGIN SCREEN -->
    <div id="loginScreen" class="fixed inset-0 z-50 flex items-center justify-center bg-[#0f172a]">
        <div class="glass rounded-2xl p-8 max-w-md w-full mx-4">
            <div class="text-center mb-8">
                <div class="w-16 h-16 rounded-full bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center mx-auto mb-4">
                    <i class="fas fa-lock text-2xl text-white"></i>
                </div>
                <h1 class="text-2xl font-bold text-white">Admin Access</h1>
                <p class="text-gray-400 text-sm mt-2">Coach Destiny Affiliate Hub</p>
            </div>

            <form id="loginForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Password</label>
                    <div class="relative">
                        <input type="password" id="adminPassword" required 
                            class="w-full px-4 py-3 rounded-lg bg-white/5 border border-white/10 text-white focus:border-blue-500 focus:outline-none transition-colors"
                            placeholder="Enter admin password">
                        <button type="button" onclick="togglePassword()" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-white">
                            <i class="fas fa-eye" id="eyeIcon"></i>
                        </button>
                    </div>
                    <p class="text-red-400 text-sm mt-2 hidden" id="errorMsg">
                        <i class="fas fa-exclamation-circle"></i> Incorrect password
                    </p>
                </div>

                <button type="submit" class="w-full py-3 rounded-lg bg-gradient-to-r from-blue-600 to-purple-600 text-white font-bold hover:from-blue-700 hover:to-purple-700 transition-all">
                    <i class="fas fa-sign-in-alt"></i> Access Dashboard
                </button>
            </form>

            <div class="mt-6 text-center">
                <a href="index.html" class="text-gray-400 text-sm hover:text-white transition-colors">
                    <i class="fas fa-arrow-left"></i> Back to Website
                </a>
            </div>
        </div>
    </div>

    <!-- ADMIN DASHBOARD (Hidden until login) -->
    <div id="adminDashboard" class="hidden">
        <!-- Header -->
        <header class="glass border-b border-white/10 py-4 px-6">
            <div class="max-w-7xl mx-auto flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center">
                        <i class="fas fa-shield-alt text-white"></i>
                    </div>
                    <div>
                        <h1 class="font-bold text-xl text-white">Admin Panel</h1>
                        <p class="text-gray-400 text-sm">Coach Destiny Affiliate Hub</p>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <span class="text-gray-400 text-sm hidden md:block">
                        <i class="fas fa-user-circle"></i> Owner Access
                    </span>
                    <button onclick="refreshData()" class="px-4 py-2 bg-blue-600 rounded-lg hover:bg-blue-700 transition-colors">
                        <i class="fas fa-sync-alt"></i> Refresh
                    </button>
                    <button onclick="logout()" class="px-4 py-2 bg-red-600/20 text-red-400 rounded-lg hover:bg-red-600/30 transition-colors">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </button>
                </div>
            </div>
        </header>

        <!-- Stats Cards -->
        <div class="max-w-7xl mx-auto px-6 py-6">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
                <div class="glass rounded-xl p-4">
                    <p class="text-gray-400 text-sm">Total Registrations</p>
                    <p class="text-3xl font-bold text-white" id="totalCount">0</p>
                </div>
                <div class="glass rounded-xl p-4">
                    <p class="text-gray-400 text-sm">Pending Approval</p>
                    <p class="text-3xl font-bold text-amber-400" id="pendingCount">0</p>
                </div>
                <div class="glass rounded-xl p-4">
                    <p class="text-gray-400 text-sm">Approved</p>
                    <p class="text-3xl font-bold text-green-400" id="approvedCount">0</p>
                </div>
                <div class="glass rounded-xl p-4">
                    <p class="text-gray-400 text-sm">Paid & Verified</p>
                    <p class="text-3xl font-bold text-blue-400" id="paidCount">0</p>
                </div>
            </div>

            <!-- Filters -->
            <div class="glass rounded-xl p-4 mb-6 flex flex-wrap gap-3">
                <button onclick="filterUsers('all')" class="px-4 py-2 bg-blue-600 rounded-lg text-sm font-medium hover:bg-blue-700 transition-colors">All</button>
                <button onclick="filterUsers('pending')" class="px-4 py-2 bg-amber-500/20 text-amber-400 rounded-lg text-sm font-medium hover:bg-amber-500/30 transition-colors">Pending</button>
                <button onclick="filterUsers('approved')" class="px-4 py-2 bg-green-500/20 text-green-400 rounded-lg text-sm font-medium hover:bg-green-500/30 transition-colors">Approved</button>
                <button onclick="exportData()" class="px-4 py-2 bg-purple-600 rounded-lg text-sm font-medium hover:bg-purple-700 transition-colors">
                    <i class="fas fa-download"></i> Export
                </button>
                <button onclick="clearAllData()" class="px-4 py-2 bg-red-500/20 text-red-400 rounded-lg text-sm font-medium hover:bg-red-500/30 transition-colors ml-auto">
                    <i class="fas fa-trash"></i> Clear All
                </button>
            </div>

            <!-- Registrations Table -->
            <div class="glass rounded-xl overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-white/5 border-b border-white/10">
                            <tr>
                                <th class="px-6 py-4 text-sm font-semibold text-gray-300">ID</th>
                                <th class="px-6 py-4 text-sm font-semibold text-gray-300">Name</th>
                                <th class="px-6 py-4 text-sm font-semibold text-gray-300">Contact</th>
                                <th class="px-6 py-4 text-sm font-semibold text-gray-300">State</th>
                                <th class="px-6 py-4 text-sm font-semibold text-gray-300">Referral</th>
                                <th class="px-6 py-4 text-sm font-semibold text-gray-300">Date</th>
                                <th class="px-6 py-4 text-sm font-semibold text-gray-300">Payment</th>
                                <th class="px-6 py-4 text-sm font-semibold text-gray-300">Status</th>
                                <th class="px-6 py-4 text-sm font-semibold text-gray-300">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="usersTableBody" class="divide-y divide-white/10">
                            <!-- Data loads here -->
                        </tbody>
                    </table>
                </div>
                <div id="emptyState" class="hidden text-center py-12 text-gray-400">
                    <i class="fas fa-inbox text-4xl mb-3"></i>
                    <p>No registrations found</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURATION - CHANGE THIS PASSWORD
        const ADMIN_PASSWORD = 'Destiny2024!'; // Change this to your preferred password
        
        let allUsers = [];
        let isAuthenticated = false;

        // Check if already logged in (session only)
        if (sessionStorage.getItem('adminAuth') === 'true') {
            showDashboard();
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const input = document.getElementById('adminPassword').value;
            
            if (input === ADMIN_PASSWORD) {
                sessionStorage.setItem('adminAuth', 'true');
                showDashboard();
            } else {
                const errorMsg = document.getElementById('errorMsg');
                const loginScreen = document.getElementById('loginScreen');
                
                errorMsg.classList.remove('hidden');
                loginScreen.classList.add('shake');
                
                setTimeout(() => {
                    loginScreen.classList.remove('shake');
                }, 500);
                
                document.getElementById('adminPassword').value = '';
            }
        });

        function togglePassword() {
            const input = document.getElementById('adminPassword');
            const icon = document.getElementById('eyeIcon');
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        function showDashboard() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('adminDashboard').classList.remove('hidden');
            isAuthenticated = true;
            loadUsers();
        }

        function logout() {
            sessionStorage.removeItem('adminAuth');
            location.reload();
        }

        function loadUsers() {
            if (!isAuthenticated) return;
            
            allUsers = JSON.parse(localStorage.getItem('affiliateUsers')) || [];
            displayUsers(allUsers);
            updateStats();
        }

        function displayUsers(users) {
            const tbody = document.getElementById('usersTableBody');
            const emptyState = document.getElementById('emptyState');
            
            tbody.innerHTML = '';
            
            if (users.length === 0) {
                emptyState.classList.remove('hidden');
                return;
            }
            emptyState.classList.add('hidden');

            users.sort((a, b) => b.id - a.id);

            users.forEach(user => {
                const row = document.createElement('tr');
                row.className = 'hover:bg-white/5 transition-colors';
                
                const statusClass = user.status === 'approved' ? 'status-approved' : 
                                   user.status === 'rejected' ? 'status-rejected' : 'status-pending';
                
                const paymentClass = user.paymentStatus === 'verified' ? 'payment-verified' : 
                                    user.paymentStatus === 'paid' ? 'payment-paid' : 'payment-unpaid';
                
                row.innerHTML = `
                    <td class="px-6 py-4 text-sm text-gray-400">#${user.id.toString().slice(-6)}</td>
                    <td class="px-6 py-4">
                        <p class="font-medium text-white">${user.firstname} ${user.lastname}</p>
                        <p class="text-xs text-gray-400">${user.email}</p>
                    </td>
                    <td class="px-6 py-4 text-sm text-gray-300">${user.phone}</td>
                    <td class="px-6 py-4 text-sm text-gray-300">${user.state}</td>
                    <td class="px-6 py-4 text-sm text-gray-400">${user.referral}</td>
                    <td class="px-6 py-4 text-sm text-gray-400">${user.date}</td>
                    <td class="px-6 py-4">
                        <span class="px-2 py-1 rounded text-xs font-medium ${paymentClass}">
                            ${user.paymentStatus || 'unpaid'}
                        </span>
                    </td>
                    <td class="px-6 py-4">
                        <span class="px-2 py-1 rounded text-xs font-medium ${statusClass}">
                            ${user.status}
                        </span>
                    </td>
                    <td class="px-6 py-4">
                        <div class="flex gap-2 flex-wrap">
                            ${user.status === 'pending' ? `
                                <button onclick="approveUser(${user.id})" class="px-3 py-1 bg-green-600 rounded text-xs hover:bg-green-700 transition-colors" title="Approve">
                                    <i class="fas fa-check"></i>
                                </button>
                                <button onclick="rejectUser(${user.id})" class="px-3 py-1 bg-red-600 rounded text-xs hover:bg-red-700 transition-colors" title="Reject">
                                    <i class="fas fa-times"></i>
                                </button>
                            ` : ''}
                            <button onclick="markPaid(${user.id})" class="px-3 py-1 bg-blue-600 rounded text-xs hover:bg-blue-700 transition-colors" title="Toggle Payment Status">
                                <i class="fas fa-money-bill"></i>
                            </button>
                            <button onclick="copyDetails(${user.id})" class="px-3 py-1 bg-gray-600 rounded text-xs hover:bg-gray-700 transition-colors" title="Copy Details">
                                <i class="fas fa-copy"></i>
                            </button>
                            <button onclick="deleteUser(${user.id})" class="px-3 py-1 bg-red-900/50 text-red-400 rounded text-xs hover:bg-red-900/70 transition-colors" title="Delete">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        function updateStats() {
            document.getElementById('totalCount').textContent = allUsers.length;
            document.getElementById('pendingCount').textContent = allUsers.filter(u => u.status === 'pending').length;
            document.getElementById('approvedCount').textContent = allUsers.filter(u => u.status === 'approved').length;
            document.getElementById('paidCount').textContent = allUsers.filter(u => u.paymentStatus === 'verified').length;
        }

        function filterUsers(filter) {
            if (filter === 'all') {
                displayUsers(allUsers);
            } else {
                const filtered = allUsers.filter(u => u.status === filter);
                displayUsers(filtered);
            }
        }

        function approveUser(id) {
            let users = JSON.parse(localStorage.getItem('affiliateUsers')) || [];
            const user = users.find(u => u.id === id);
            if (user) {
                user.status = 'approved';
                localStorage.setItem('affiliateUsers', JSON.stringify(users));
                loadUsers();
                
                // WhatsApp notification
                const message = `*Congratulations ${user.firstname}!*%0A%0AYour affiliate application has been *APPROVED*.%0A%0AWelcome to Coach Destiny Affiliate Hub!`;
                window.open(`https://wa.me/${user.phone}?text=${message}`, '_blank');
            }
        }

        function rejectUser(id) {
            if (!confirm('Are you sure you want to reject this application?')) return;
            
            let users = JSON.parse(localStorage.getItem('affiliateUsers')) || [];
            const user = users.find(u => u.id === id);
            if (user) {
                user.status = 'rejected';
                localStorage.setItem('affiliateUsers', JSON.stringify(users));
                loadUsers();
            }
        }

        function markPaid(id) {
            let users = JSON.parse(localStorage.getItem('affiliateUsers')) || [];
            const user = users.find(u => u.id === id);
            if (user) {
                const statuses = ['unpaid', 'paid', 'verified'];
                const currentIndex = statuses.indexOf(user.paymentStatus || 'unpaid');
                user.paymentStatus = statuses[(currentIndex + 1) % statuses.length];
                localStorage.setItem('affiliateUsers', JSON.stringify(users));
                loadUsers();
            }
        }

        function copyDetails(id) {
            const user = allUsers.find(u => u.id === id);
            if (user) {
                const details = `*AFFILIATE DETAILS*
Name: ${user.firstname} ${user.lastname}
Email: ${user.email}
Phone: ${user.phone}
State: ${user.state}
Status: ${user.status}
Payment: ${user.paymentStatus || 'unpaid'}
Date: ${user.date}`;
                
                navigator.clipboard.writeText(details).then(() => {
                    alert('Details copied to clipboard!');
                });
            }
        }

        function deleteUser(id) {
            if (!confirm('Delete this registration permanently?')) return;
            
            let users = JSON.parse(localStorage.getItem('affiliateUsers')) || [];
            users = users.filter(u => u.id !== id);
            localStorage.setItem('affiliateUsers', JSON.stringify(users));
            loadUsers();
        }

        function clearAllData() {
            if (!confirm('WARNING: This will delete ALL registrations. Continue?')) return;
            localStorage.removeItem('affiliateUsers');
            loadUsers();
        }

        function exportData() {
            const dataStr = JSON.stringify(allUsers, null, 2);
            const dataBlob = new Blob([dataStr], {type: 'application/json'});
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `affiliates_backup_${new Date().toISOString().split('T')[0]}.json`;
            link.click();
        }

        function refreshData() {
            loadUsers();
        }

        // Auto-refresh every 30 seconds
        setInterval(() => {
            if (isAuthenticated) loadUsers();
        }, 30000);
    </script>
</body>
</html>
