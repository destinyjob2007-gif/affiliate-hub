<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Coach Destiny Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #0f172a; color: white; font-family: 'Segoe UI', sans-serif; }
        .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .success-pulse { animation: pulse-green 2s infinite; }
        @keyframes pulse-green { 0%,100%{box-shadow:0 0 0 0 rgba(16,185,129,0.7);} 50%{box-shadow:0 0 0 20px rgba(16,185,129,0);} }
        .hidden { display: none !important; }
    </style>
</head>
<body class="min-h-screen p-4">

    <!-- LOGIN SCREEN -->
    <div id="loginScreen" class="max-w-md mx-auto mt-20 glass rounded-2xl p-8">
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-gradient-to-br from-blue-500 to-purple-600 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-lock text-2xl"></i>
            </div>
            <h1 class="text-2xl font-bold">Coach Destiny Admin</h1>
            <p class="text-gray-400 text-sm">Authorized Personnel Only</p>
        </div>
        
        <div class="space-y-4">
            <div>
                <label class="block text-sm text-gray-400 mb-2">Password</label>
                <input type="password" id="adminPassword" class="w-full bg-black/30 border border-white/10 rounded-lg px-4 py-3 text-white focus:border-blue-500 focus:outline-none" placeholder="Enter password">
            </div>
            <button onclick="checkLogin()" class="w-full bg-gradient-to-r from-blue-600 to-purple-600 py-3 rounded-lg font-bold hover:opacity-90 transition-opacity">
                Access Dashboard
            </button>
            <p id="loginError" class="text-red-400 text-sm text-center hidden">Wrong password!</p>
        </div>
    </div>

    <!-- ADMIN DASHBOARD -->
    <div id="dashboard" class="hidden max-w-4xl mx-auto">
        <!-- Header -->
        <div class="flex items-center justify-between mb-8 glass rounded-xl p-4">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-green-500 rounded-full flex items-center justify-center success-pulse">
                    <i class="fas fa-shield-alt text-xl"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold">Admin Dashboard</h1>
                    <p class="text-green-400 text-sm">● System Active</p>
                </div>
            </div>
            <button onclick="logout()" class="text-gray-400 hover:text-white">
                <i class="fas fa-sign-out-alt text-xl"></i>
            </button>
        </div>

        <!-- Stats -->
        <div class="grid grid-cols-3 gap-4 mb-6">
            <div class="glass rounded-xl p-4 text-center">
                <p class="text-gray-400 text-sm">Pending</p>
                <p class="text-3xl font-bold text-amber-400" id="pendingCount">0</p>
            </div>
            <div class="glass rounded-xl p-4 text-center">
                <p class="text-gray-400 text-sm">Confirmed Today</p>
                <p class="text-3xl font-bold text-green-400" id="confirmedCount">0</p>
            </div>
            <div class="glass rounded-xl p-4 text-center">
                <p class="text-gray-400 text-sm">Total Earnings</p>
                <p class="text-3xl font-bold text-blue-400" id="totalEarnings">₦0</p>
            </div>
        </div>

        <!-- Pending Payments List -->
        <div class="glass rounded-xl p-6">
            <h2 class="text-lg font-bold mb-4 flex items-center gap-2">
                <i class="fas fa-clock text-amber-400"></i> Pending Verifications
            </h2>
            
            <div id="pendingList" class="space-y-3">
                <!-- Empty state -->
                <div id="emptyState" class="text-center py-8 text-gray-500">
                    <i class="fas fa-inbox text-4xl mb-2"></i>
                    <p>No pending payments</p>
                </div>
            </div>
        </div>

        <!-- Confirmed List -->
        <div class="glass rounded-xl p-6 mt-6">
            <h2 class="text-lg font-bold mb-4 flex items-center gap-2">
                <i class="fas fa-check-circle text-green-400"></i> Recently Confirmed
            </h2>
            <div id="confirmedList" class="space-y-2 max-h-60 overflow-y-auto">
                <!-- Confirmed items appear here -->
            </div>
        </div>

        <!-- Manual Confirm Section -->
        <div class="glass rounded-xl p-6 mt-6 border-2 border-blue-500/30">
            <h2 class="text-lg font-bold mb-4 text-blue-400">
                <i class="fas fa-magic"></i> Quick Confirm (Manual)
            </h2>
            <div class="flex gap-3">
                <input type="text" id="manualPhone" placeholder="Enter phone number (e.g. 08012345678)" 
                    class="flex-1 bg-black/30 border border-white/10 rounded-lg px-4 py-3 text-white focus:border-blue-500 focus:outline-none">
                <button onclick="manualConfirm()" class="bg-green-600 hover:bg-green-700 px-6 py-3 rounded-lg font-bold transition-colors">
                    Verify
                </button>
            </div>
            <p class="text-gray-500 text-sm mt-2">Use this if someone paid but didn't fill the form</p>
        </div>
    </div>

    <script>
        // PASSWORD - CHANGE THIS TO YOUR OWN!
        const ADMIN_PASSWORD = "Destiny2024"; // ← CHANGE THIS!
        
        // Storage keys
        const PENDING_KEY = 'cd_pending_payments';
        const CONFIRMED_KEY = 'cd_confirmed_payments';

        // Check login
        function checkLogin() {
            const input = document.getElementById('adminPassword').value;
            if (input === ADMIN_PASSWORD) {
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                loadData();
            } else {
                document.getElementById('loginError').classList.remove('hidden');
            }
        }

        function logout() {
            document.getElementById('dashboard').classList.add('hidden');
            document.getElementById('loginScreen').classList.remove('hidden');
            document.getElementById('adminPassword').value = '';
        }

        // Load all data
        function loadData() {
            const pending = JSON.parse(localStorage.getItem(PENDING_KEY) || '[]');
            const confirmed = JSON.parse(localStorage.getItem(CONFIRMED_KEY) || '[]');
            
            updateStats(pending, confirmed);
            renderPending(pending);
            renderConfirmed(confirmed);
        }

        function updateStats(pending, confirmed) {
            document.getElementById('pendingCount').textContent = pending.length;
            document.getElementById('confirmedCount').textContent = confirmed.filter(c => {
                const today = new Date().toDateString();
                return new Date(c.time).toDateString() === today;
            }).length;
            document.getElementById('totalEarnings').textContent = '₦' + (confirmed.length * 10000).toLocaleString();
        }

        function renderPending(pending) {
            const list = document.getElementById('pendingList');
            const empty = document.getElementById('emptyState');
            
            if (pending.length === 0) {
                empty.classList.remove('hidden');
                list.innerHTML = '';
                list.appendChild(empty);
                return;
            }
            
            empty.classList.add('hidden');
            list.innerHTML = pending.map((p, index) => `
                <div class="bg-white/5 rounded-lg p-4 flex items-center justify-between border-l-4 border-amber-500">
                    <div>
                        <p class="font-bold text-white">${p.name}</p>
                        <p class="text-sm text-gray-400">${p.phone} • ${p.state}</p>
                        <p class="text-xs text-gray-500 mt-1">Registered: ${new Date(p.time).toLocaleTimeString()}</p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="confirmPayment('${p.phone}')" 
                            class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg font-bold transition-colors flex items-center gap-2">
                            <i class="fas fa-check"></i> Confirm
                        </button>
                        <button onclick="rejectPayment('${p.phone}')"
                            class="bg-red-600/50 hover:bg-red-600 text-white px-3 py-2 rounded-lg transition-colors">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function renderConfirmed(confirmed) {
            const list = document.getElementById('confirmedList');
            const recent = confirmed.slice(-10).reverse(); // Show last 10
            
            list.innerHTML = recent.map(c => `
                <div class="bg-green-500/10 border border-green-500/20 rounded-lg p-3 flex items-center justify-between">
                    <div>
                        <p class="font-bold text-white text-sm">${c.name}</p>
                        <p class="text-xs text-gray-400">${c.phone}</p>
                    </div>
                    <div class="text-right">
                        <p class="text-green-400 text-xs font-bold">✅ VERIFIED</p>
                        <p class="text-gray-500 text-xs">${new Date(c.confirmedTime).toLocaleTimeString()}</p>
                    </div>
                </div>
            `).join('');
        }

        // Confirm payment
        function confirmPayment(phone) {
            let pending = JSON.parse(localStorage.getItem(PENDING_KEY) || '[]');
            let confirmed = JSON.parse(localStorage.getItem(CONFIRMED_KEY) || '[]');
            
            const person = pending.find(p => p.phone === phone);
            if (!person) return;
            
            // Move to confirmed
            person.confirmedTime = new Date().toISOString();
            confirmed.push(person);
            
            // Remove from pending
            pending = pending.filter(p => p.phone !== phone);
            
            // Save
            localStorage.setItem(PENDING_KEY, JSON.stringify(pending));
            localStorage.setItem(CONFIRMED_KEY, JSON.stringify(confirmed));
            
            // Broadcast to user's page (this is the magic!)
            localStorage.setItem('cd_verify_' + phone, JSON.stringify({
                status: 'confirmed',
                time: new Date().toISOString(),
                name: person.name
            }));
            
            loadData();
            
            // Visual feedback
            alert(`✅ ${person.name} has been verified! Their screen will update automatically.`);
        }

        // Reject payment
        function rejectPayment(phone) {
            if (!confirm('Are you sure you want to reject this?')) return;
            
            let pending = JSON.parse(localStorage.getItem(PENDING_KEY) || '[]');
            pending = pending.filter(p => p.phone !== phone);
            localStorage.setItem(PENDING_KEY, JSON.stringify(pending));
            
            loadData();
        }

        // Manual confirm (for people who paid outside the form)
        function manualConfirm() {
            const phone = document.getElementById('manualPhone').value.trim();
            if (!phone) return alert('Enter a phone number');
            
            let confirmed = JSON.parse(localStorage.getItem(CONFIRMED_KEY) || '[]');
            
            // Add manually
            confirmed.push({
                name: 'Manual Entry',
                phone: phone,
                state: 'Unknown',
                time: new Date().toISOString(),
                confirmedTime: new Date().toISOString(),
                manual: true
            });
            
            localStorage.setItem(CONFIRMED_KEY, JSON.stringify(confirmed));
            
            // Broadcast verification
            localStorage.setItem('cd_verify_' + phone, JSON.stringify({
                status: 'confirmed',
                time: new Date().toISOString(),
                name: 'Valued Affiliate'
            }));
            
            document.getElementById('manualPhone').value = '';
            loadData();
            alert(`✅ ${phone} has been manually verified!`);
        }

        // Auto-refresh every 5 seconds to catch new registrations
        setInterval(loadData, 5000);

        // Enter key on password
        document.getElementById('adminPassword').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkLogin();
        });
    </script>
</body>
</html>
